<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Compass Quest — Gamified Safety Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --gold: #c8a951;
  --gold-dim: #8a7235;
  --dark: #0a0a1a;
  --dark2: #1a1a2e;
  --green: #50fa7b;
  --red: #ff5555;
  --cyan: #8be9fd;
  --sky: #4a90d9;
  --grass: #2d5a1e;
  --grass2: #3a7a28;
  --path: #c4a265;
  --path2: #a88a50;
  --brown: #5a3a1a;
  --stone: #6a6a7a;
  --white: #f0f0ff;
  --castle-wall: #8a8a9a;
  --castle-dark: #5a5a6a;
  --flag-green: #3aaa3a;
  --wood: #6a4a2a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Press Start 2P', monospace; image-rendering: pixelated; }

#game {
  position: relative;
  width: 100%; max-width: 900px;
  height: 100vh; max-height: 650px;
  margin: auto; background: var(--dark); overflow: hidden;
}

/* ===== TITLE SCREEN ===== */
#titleScreen {
  position: absolute; inset: 0; z-index: 200;
  background: linear-gradient(180deg, #1a2a3a 0%, #0a1520 60%, #0a0a1a 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
}
.title-stars { position: absolute; inset: 0; overflow: hidden; }
.star {
  position: absolute; width: 2px; height: 2px;
  background: var(--gold); border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:1} }

.title-logo-container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px;
}
.title-logo-img {
  width: clamp(280px, 70vw, 480px);
  height: auto;
  image-rendering: auto;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  border-radius: 8px;
}

.start-prompt {
  font-size: clamp(7px, 1.8vw, 10px); color: var(--gold); margin-top: 30px;
  animation: blink 1.2s step-end infinite; position: relative; z-index: 1;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ===== REGISTRATION SCREEN ===== */
#regScreen {
  position: absolute; inset: 0; z-index: 190;
  background: linear-gradient(180deg, #1a2a3a 0%, #0a1520 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
.reg-title { font-size: clamp(12px, 3vw, 18px); color: var(--gold); margin-bottom: 20px; text-shadow: 2px 2px 0 var(--gold-dim); }
.reg-form { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 340px; }
.reg-form label { font-size: 8px; color: #aadcff; letter-spacing: 2px; display: block; margin-bottom: 4px; }
.reg-form input, .reg-form select {
  width: 100%; padding: 10px 12px;
  background: rgba(200,220,255,0.12); border: 2px solid rgba(170,220,255,0.35);
  border-radius: 4px; color: #ffffff;
  font-family: 'Press Start 2P', monospace; font-size: 9px;
}
.reg-form input::placeholder { color: rgba(200,220,255,0.5); }
.reg-form select option { background: #1a2a3a; color: #ffffff; }
.reg-form input:focus, .reg-form select:focus {
  border-color: var(--cyan); outline: none; box-shadow: 0 0 12px rgba(139,233,253,0.2);
}
.btn-start {
  padding: 14px 28px; background: rgba(200,169,81,0.15); border: 2px solid var(--gold);
  color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 10px;
  cursor: pointer; border-radius: 4px; margin-top: 10px; transition: all 0.2s;
}
.btn-start:hover { background: rgba(200,169,81,0.3); box-shadow: 0 0 16px rgba(200,169,81,0.3); }

/* ===== MAP SCREEN ===== */
#mapScreen { position: absolute; inset: 0; z-index: 100; display: none; }
.map-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #4a8ad4 0%, #6ab4e8 25%, #88cc88 45%, #3a7a28 60%, #2d5a1e 100%);
}
.cloud { position: absolute; background: rgba(255,255,255,0.7); border-radius: 20px; }
.cloud::before, .cloud::after { content: ''; position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; }
.cloud1 { width: 60px; height: 16px; top: 8%; left: 10%; animation: drift 20s linear infinite; }
.cloud1::before { width: 24px; height: 24px; top: -12px; left: 12px; }
.cloud1::after { width: 18px; height: 18px; top: -8px; left: 32px; }
.cloud2 { width: 50px; height: 14px; top: 5%; left: 55%; animation: drift 25s linear infinite 5s; }
.cloud2::before { width: 20px; height: 20px; top: -10px; left: 10px; }
.cloud2::after { width: 16px; height: 16px; top: -6px; left: 28px; }
.cloud3 { width: 45px; height: 12px; top: 12%; left: 80%; animation: drift 22s linear infinite 10s; }
.cloud3::before { width: 18px; height: 18px; top: -9px; left: 8px; }
.cloud3::after { width: 14px; height: 14px; top: -5px; left: 24px; }
@keyframes drift { 0%{transform:translateX(0)} 100%{transform:translateX(-120px)} }

.mountains {
  position: absolute; bottom: 40%; width: 100%; height: 30%; background: #5a6a7a;
  clip-path: polygon(0 100%, 0 70%, 8% 30%, 16% 60%, 24% 15%, 32% 55%, 40% 25%, 48% 50%, 55% 10%, 62% 45%, 70% 20%, 78% 55%, 85% 30%, 92% 50%, 100% 35%, 100% 100%);
}
.mountains::after {
  content: ''; position: absolute; inset: 0; background: #7a8a9a;
  clip-path: polygon(0 100%, 8% 40%, 16% 65%, 24% 25%, 32% 60%, 40% 35%, 48% 55%, 55% 20%, 62% 50%, 70% 30%, 78% 60%, 85% 40%, 100% 45%, 100% 100%);
}

.map-castle { position: absolute; z-index: 20; }
.map-castle .c-tower { position: absolute; bottom: 0; width: 20px; background: var(--castle-wall); border: 1px solid var(--castle-dark); }
.map-castle .c-tower.cl { left: 0; height: 55px; }
.map-castle .c-tower.cr { right: 0; height: 55px; }
.map-castle .c-tower::before { content:''; position: absolute; top: -8px; left: 1px; right: 1px; height: 8px; background: var(--castle-wall); clip-path: polygon(0 100%,15% 0,30% 100%,50% 0,70% 100%,85% 0,100% 100%); }
.map-castle .c-wall { position: absolute; bottom: 0; left: 20px; right: 20px; height: 40px; background: var(--castle-dark); border: 1px solid #4a4a5a; }
.map-castle .c-gate { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 16px; height: 22px; background: #2a2a3a; border-radius: 8px 8px 0 0; }
.map-castle .c-flag { position: absolute; top: -18px; width: 12px; height: 8px; background: var(--flag-green); }
.map-castle .c-flag.cfl { left: 4px; } .map-castle .c-flag.cfr { right: 4px; }
.map-castle .c-fpole { position: absolute; width: 2px; height: 12px; background: var(--gold-dim); }
.map-castle .c-fpole.cfpl { left: 9px; top: -18px; } .map-castle .c-fpole.cfpr { right: 9px; top: -18px; }

.tree { position: absolute; z-index: 15; }
.tree .trunk { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 6px; background: var(--brown); border-radius: 1px; }
.tree .canopy { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: #1a5a1a; border-radius: 2px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
.tree.sm .trunk { height: 10px; } .tree.sm .canopy { width: 16px; height: 18px; bottom: 8px; }
.tree.md .trunk { height: 14px; } .tree.md .canopy { width: 22px; height: 24px; bottom: 12px; }
.tree.lg .trunk { height: 18px; } .tree.lg .canopy { width: 28px; height: 30px; bottom: 15px; }

.road-path { position: absolute; z-index: 10; inset: 0; }
.road-path svg { position: absolute; inset: 0; width: 100%; height: 100%; }

.map-node {
  position: absolute; z-index: 30; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.2s, filter 0.2s;
}
.map-node:hover { transform: scale(1.15); }
.map-node.locked { cursor: not-allowed; filter: brightness(0.5); }
.map-node.locked:hover { transform: scale(1); }
.map-node.completed .node-circle { background: var(--green); border-color: #2a8a3a; }
.map-node.current .node-circle { animation: nodePulse 1.5s ease-in-out infinite; }
.node-circle {
  width: 36px; height: 36px; background: var(--gold); border: 3px solid var(--gold-dim);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
@keyframes nodePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,169,81,0.4), 0 2px 8px rgba(0,0,0,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(200,169,81,0), 0 2px 8px rgba(0,0,0,0.4); }
}
.node-label {
  position: absolute; bottom: -16px; font-size: 5px; color: #ffffff;
  white-space: nowrap; text-shadow: 1px 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7); text-align: center;
}

#mapPlayer {
  position: absolute; z-index: 50; width: 24px; height: 32px;
  transition: left 1s ease-in-out, top 1s ease-in-out;
}
#mapPlayer .p-helmet { width: 14px; height: 10px; background: var(--gold); border-radius: 3px 3px 0 0; position: absolute; top: 0; left: 5px; }
#mapPlayer .p-visor { width: 8px; height: 3px; background: #2a2a4a; position: absolute; top: 6px; left: 8px; border-radius: 1px; }
#mapPlayer .p-body { width: 16px; height: 12px; background: var(--sky); position: absolute; top: 9px; left: 4px; border-radius: 2px; }
#mapPlayer .p-shield { width: 8px; height: 10px; background: var(--castle-wall); border: 1px solid var(--gold-dim); border-radius: 2px 2px 4px 4px; position: absolute; top: 10px; left: -2px; }
#mapPlayer .p-legs { position: absolute; bottom: 0; left: 5px; display: flex; gap: 2px; }
#mapPlayer .p-leg { width: 5px; height: 8px; background: var(--brown); border-radius: 0 0 2px 2px; }

.map-hud {
  position: absolute; top: 0; left: 0; right: 0; z-index: 60;
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  background: linear-gradient(180deg, rgba(10,10,26,0.9) 0%, rgba(10,10,26,0) 100%);
}
.hud-quests { font-size: 7px; color: var(--gold); }
.hud-score { font-size: 7px; color: var(--cyan); }
.hud-inv { font-size: 7px; color: var(--green); display: flex; gap: 6px; }
.hud-item { opacity: 0.3; transition: opacity 0.3s; font-size: 14px; }
.hud-item.collected { opacity: 1; }

/* ===== CHALLENGE SCREEN ===== */
#challengeScreen {
  position: absolute; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.88);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px; overflow-y: auto;
}
.challenge-box {
  width: 100%; max-width: 560px;
  background: var(--dark2); border: 3px solid var(--gold); border-radius: 8px;
  padding: 20px; box-shadow: 0 0 30px rgba(200,169,81,0.2);
  max-height: 90vh; overflow-y: auto;
}
.challenge-location { font-size: 7px; color: #aadcff; letter-spacing: 3px; margin-bottom: 6px; }
.challenge-npc { font-size: 10px; color: var(--gold); margin-bottom: 12px; }
.challenge-narrative {
  font-size: 8px; color: #c8c8d8; line-height: 2; margin-bottom: 16px;
  border-left: 2px solid var(--gold-dim); padding-left: 10px;
}
.challenge-question { font-size: 9px; color: #ffffff; line-height: 2; margin-bottom: 16px; }

.challenge-img-container {
  width: 100%; max-width: 400px; margin: 0 auto 16px auto; border: 2px solid var(--gold-dim); border-radius: 4px; overflow: hidden;
}
.challenge-img-container img { width: 100%; display: block; }

/* MCQ */
.challenge-choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn {
  width: 100%; padding: 12px 14px;
  background: rgba(170,220,255,0.08); border: 2px solid rgba(170,220,255,0.25);
  border-radius: 4px; color: #e8e8ff;
  font-family: 'Press Start 2P', monospace; font-size: 7px; line-height: 1.8;
  cursor: pointer; text-align: left; transition: all 0.15s;
}
.choice-btn:hover { background: rgba(170,220,255,0.18); border-color: var(--cyan); }
.choice-btn.correct-flash { background: rgba(80,250,123,0.2); border-color: var(--green); color: var(--green); }
.choice-btn.wrong-flash { background: rgba(255,85,85,0.2); border-color: var(--red); color: var(--red); }
.choice-btn:disabled { pointer-events: none; opacity: 0.4; }
.choice-btn:disabled.correct-flash, .choice-btn:disabled.wrong-flash { opacity: 1; }

/* Image MCQ */
.img-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.img-choice-btn {
  background: rgba(170,220,255,0.06); border: 2px solid rgba(170,220,255,0.2);
  border-radius: 6px; padding: 8px; cursor: pointer; transition: all 0.15s; text-align: center;
}
.img-choice-btn:hover { border-color: var(--cyan); background: rgba(170,220,255,0.12); }
.img-choice-btn img { width: 100%; max-height: 100px; object-fit: contain; border-radius: 4px; margin-bottom: 6px; }
.img-choice-btn .img-label { font-size: 6px; color: #d0d0e0; line-height: 1.6; }
.img-choice-btn.correct-flash { background: rgba(80,250,123,0.15); border-color: var(--green); }
.img-choice-btn.correct-flash .img-label { color: var(--green); }
.img-choice-btn.wrong-flash { background: rgba(255,85,85,0.15); border-color: var(--red); }
.img-choice-btn.wrong-flash .img-label { color: var(--red); }
.img-choice-btn.disabled { pointer-events: none; opacity: 0.35; }
.img-choice-btn.disabled.correct-flash, .img-choice-btn.disabled.wrong-flash { opacity: 1; }

/* Hotspot */
.hotspot-container {
  position: relative; width: 100%; max-width: 400px; margin: 0 auto 12px auto;
  border: 2px solid var(--gold-dim); border-radius: 4px; overflow: hidden;
}
.hotspot-container img { width: 100%; display: block; }
.hotspot-zone {
  position: absolute; border: 2px solid transparent; border-radius: 4px;
  cursor: pointer; transition: all 0.2s;
}
.hotspot-zone.found { border-color: var(--green); background: rgba(80,250,123,0.15); }
.hotspot-zone.wrong-click { border-color: var(--red); background: rgba(255,85,85,0.2); }
.hotspot-icon {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 18px; display: none;
}
.hotspot-zone.found .hotspot-icon, .hotspot-zone.wrong-click .hotspot-icon { display: block; }
.hotspot-found-label {
  font-size: 6px; color: var(--green); margin-top: 4px; padding: 4px 8px;
  background: rgba(80,250,123,0.08); border-radius: 3px; line-height: 1.8;
}
.hotspot-wrong-label {
  font-size: 6px; color: var(--red); margin-top: 4px; padding: 4px 8px;
  background: rgba(255,85,85,0.08); border-radius: 3px; line-height: 1.8;
}
.hotspot-status { font-size: 7px; color: #d0d0e0; margin-bottom: 8px; }
.btn-hotspot-done {
  margin-top: 10px; padding: 10px 20px;
  background: rgba(200,169,81,0.15); border: 2px solid var(--gold);
  color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 7px;
  cursor: pointer; border-radius: 4px; display: none;
}
.btn-hotspot-done:hover { background: rgba(200,169,81,0.3); }

/* Reorder */
.reorder-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; touch-action: none; }
.reorder-item {
  padding: 12px 14px; background: rgba(170,220,255,0.08);
  border: 2px solid rgba(170,220,255,0.2); border-radius: 4px;
  color: #e0e0f0; font-family: 'Press Start 2P', monospace; font-size: 7px; line-height: 1.8;
  cursor: grab; display: flex; align-items: center; gap: 10px;
  user-select: none; -webkit-user-select: none; transition: background 0.15s;
}
.reorder-item:active { cursor: grabbing; }
.reorder-item .grip { color: #aaaacc; font-size: 10px; flex-shrink: 0; min-width: 16px; text-align: center; }
.reorder-item.drag-over { background: rgba(170,220,255,0.18); border-color: var(--cyan); }
.reorder-item.correct-pos { border-color: var(--green); background: rgba(80,250,123,0.1); }
.reorder-item.wrong-pos { border-color: var(--red); background: rgba(255,85,85,0.1); }
.btn-reorder-submit {
  padding: 10px 20px; background: rgba(200,169,81,0.15); border: 2px solid var(--gold);
  color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 8px;
  cursor: pointer; border-radius: 4px;
}
.btn-reorder-submit:hover { background: rgba(200,169,81,0.3); }

.challenge-feedback {
  margin-top: 14px; padding: 12px; border-radius: 4px; font-size: 7px; line-height: 2; display: none;
}
.challenge-feedback.correct { background: rgba(80,250,123,0.1); border: 1px solid var(--green); color: var(--green); }
.challenge-feedback.wrong { background: rgba(255,85,85,0.1); border: 1px solid var(--red); color: var(--red); }

.btn-continue {
  margin-top: 14px; padding: 10px 24px;
  background: rgba(200,169,81,0.15); border: 2px solid var(--gold);
  color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 8px;
  cursor: pointer; border-radius: 4px; display: none;
  animation: continuePulse 1.5s ease-in-out infinite;
}
@keyframes continuePulse { 0%,100%{box-shadow:0 0 0 rgba(200,169,81,0)} 50%{box-shadow:0 0 12px rgba(200,169,81,0.3)} }
.btn-continue:hover { background: rgba(200,169,81,0.3); }

/* ===== WIN SCREEN ===== */
#winScreen {
  position: absolute; inset: 0; z-index: 200;
  background: linear-gradient(180deg, #0a1520 0%, #1a0a2e 50%, #0a0a1a 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
.win-trophy { font-size: 48px; margin-bottom: 16px; animation: trophyBounce 1s ease-in-out infinite; }
@keyframes trophyBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.win-title { font-size: clamp(14px, 3.5vw, 22px); color: var(--gold); margin-bottom: 8px; text-shadow: 2px 2px 0 var(--gold-dim); }
.win-subtitle { font-size: 8px; color: var(--cyan); margin-bottom: 20px; letter-spacing: 3px; }
.win-stats {
  width: 100%; max-width: 400px; background: rgba(200,169,81,0.08);
  border: 2px solid var(--gold-dim); border-radius: 8px; padding: 16px; margin-bottom: 20px;
}
.win-stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(200,169,81,0.1); font-size: 7px;
}
.win-stat-row:last-child { border-bottom: none; }
.win-stat-label { color: #c0c0d8; }
.win-stat-value { color: var(--gold); }
.win-items-collected { display: flex; gap: 12px; margin-bottom: 20px; font-size: 24px; }
.btn-replay {
  padding: 12px 28px; background: rgba(200,169,81,0.15); border: 2px solid var(--gold);
  color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 9px;
  cursor: pointer; border-radius: 4px;
}
.btn-replay:hover { background: rgba(200,169,81,0.3); box-shadow: 0 0 16px rgba(200,169,81,0.3); }

#game::after {
  content: ''; position: absolute; inset: 0; z-index: 999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
}

@media (max-width: 600px) {
  .map-node { width: 32px; height: 32px; }
  .node-circle { width: 28px; height: 28px; font-size: 11px; }
  .node-label { font-size: 4px; bottom: -12px; }
  #mapPlayer { width: 18px; height: 26px; }
  .challenge-box { padding: 14px; }
  .img-choices { grid-template-columns: 1fr 1fr; gap: 6px; }
}
</style>
</head>
<body>
<div id="game">

<!-- TITLE SCREEN -->
<div id="titleScreen">
  <div class="title-stars" id="titleStars"></div>
  <div class="title-logo-container">
    <img class="title-logo-img" id="titleLogoImg" alt="Compass Quest - Gamified Safety Adventure">
  </div>
  <div class="start-prompt">[ CLICK TO BEGIN ]</div>
</div>

<!-- REGISTRATION -->
<div id="regScreen">
  <div class="reg-title">REGISTER THY NAME</div>
  <div class="reg-form">
    <div><label>KNIGHT'S NAME</label><input type="text" id="regName" placeholder="Enter your full name" autocomplete="off"></div>
    <div><label>GUILD (COMPANY)</label><input type="text" id="regCompany" placeholder="Enter your company" autocomplete="off"></div>
    <div><label>REALM (SITE)</label>
      <select id="regSite">
        <option value="">Select your site...</option>
        <option value="DFW">DFW</option>
        <option value="JAN I">JAN I</option>
        <option value="MXP I">MXP I</option>
        <option value="ORD">ORD</option>
        <option value="PHX I">PHX I</option>
        <option value="PHX II">PHX II</option>
      </select>
    </div>
    <button class="btn-start" onclick="startAdventure()">BEGIN THY QUEST</button>
  </div>
</div>

<!-- MAP -->
<div id="mapScreen">
  <div class="map-bg">
    <div class="cloud cloud1"></div><div class="cloud cloud2"></div><div class="cloud cloud3"></div>
    <div class="mountains"></div>
  </div>
  <div class="road-path"><svg id="roadSvg" viewBox="0 0 900 650" preserveAspectRatio="none"></svg></div>
  <div id="treesContainer"></div>

// ===== SHUFFLE =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function shuffleNeverCorrect(arr) {
  let s = shuffle(arr);
  while (s.every((v,i) => v === arr[i])) s = shuffle(arr);
  return s;
}

// ===== INIT =====
function initTitle() {
  const stars = document.getElementById('titleStars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*60+'%';
    s.style.animationDelay = (Math.random()*2)+'s';
    s.style.width = s.style.height = (Math.random()*2+1)+'px';
    stars.appendChild(s);
  }
}

function initHudInventory() {
  const hud = document.getElementById('hudInv');
  ITEMS.forEach((icon,i) => {
    const el = document.createElement('span');
    el.className = 'hud-item'; el.id = 'inv-'+i; el.textContent = icon;
    hud.appendChild(el);
  });
}

document.getElementById('titleScreen').onclick = function() {
  document.getElementById('titleScreen').style.display = 'none';

function startAdventure() {
  var name = document.getElementById('regName').value.trim();
  var company = document.getElementById('regCompany').value.trim();
  var site = document.getElementById('regSite').value;
  if (!name || !company || !site) { alert('Please fill in all fields, brave knight!'); return; }
  STATE.playerName = name; STATE.playerCompany = company; STATE.playerSite = site;
  STATE.startTime = new Date();
  document.getElementById('regScreen').style.display = 'none';
  document.getElementById('mapScreen').style.display = 'block';
  buildMap(); updateHud(); positionPlayer(0); updateNodes();
}

  var nodes = document.getElementById('nodesContainer');
  var gameW = 900, gameH = 650;
  var pts = LOCATIONS.map(function(l) { return {x: l.x/100*gameW, y: l.y/100*gameH}; });

  var pathD = 'M '+pts[0].x+' '+pts[0].y;
  for (var i = 1; i < pts.length; i++) {
    var p = pts[i-1], c = pts[i];
    pathD += ' C '+(p.x+(c.x-p.x)*0.5)+' '+p.y+', '+(p.x+(c.x-p.x)*0.5)+' '+c.y+', '+c.x+' '+c.y;
  }

  var shadow = document.createElementNS('http://www.w3.org/2000/svg','path');
  shadow.setAttribute('d',pathD); shadow.setAttribute('fill','none');
  shadow.setAttribute('stroke','#3a2a0a'); shadow.setAttribute('stroke-width','18');
  shadow.setAttribute('stroke-linecap','round'); shadow.setAttribute('stroke-linejoin','round');
  shadow.setAttribute('opacity','0.5'); svg.appendChild(shadow);

  var road = document.createElementNS('http://www.w3.org/2000/svg','path');
  road.setAttribute('d',pathD); road.setAttribute('fill','none');
  road.setAttribute('stroke','#c4a265'); road.setAttribute('stroke-width','12');
  road.setAttribute('stroke-linecap','round'); road.setAttribute('stroke-linejoin','round');
  svg.appendChild(road);

  var dashes = document.createElementNS('http://www.w3.org/2000/svg','path');
  dashes.setAttribute('d',pathD); dashes.setAttribute('fill','none');
  dashes.setAttribute('stroke','#a88a50'); dashes.setAttribute('stroke-width','2');
  dashes.setAttribute('stroke-dasharray','8 12'); dashes.setAttribute('stroke-linecap','round');
  svg.appendChild(dashes);

  LOCATIONS.forEach(function(loc,i) {
    if (loc.isCastle) {
      var castle = document.getElementById('mapCastle');
      castle.style.left = (loc.x-4)+'%'; castle.style.top = (loc.y-6)+'%';
      castle.style.width = '70px'; castle.style.height = '60px';
      return;
    }
    var node = document.createElement('div');
    node.className = 'map-node'+(i===0?' current':' locked');
    node.id = 'node-'+i;
    node.style.left = 'calc('+loc.x+'% - 20px)';
    node.style.top = 'calc('+loc.y+'% - 20px)';
    node.setAttribute('onclick', 'clickNode('+i+')');
    var circle = document.createElement('div');
    circle.className = 'node-circle'; circle.textContent = loc.icon;
    var label = document.createElement('div');
    label.className = 'node-label'; label.textContent = loc.label;
    node.appendChild(circle); node.appendChild(label);
    nodes.appendChild(node);
  });
  addTrees();
}

function addTrees() {
  var c = document.getElementById('treesContainer');
  var trees = [
    {x:5,y:60,s:'lg'},{x:3,y:75,s:'md'},{x:45,y:70,s:'lg'},{x:50,y:80,s:'sm'},
    {x:70,y:60,s:'md'},{x:80,y:50,s:'lg'},{x:85,y:65,s:'sm'},{x:90,y:75,s:'md'},
    {x:15,y:40,s:'sm'},{x:30,y:30,s:'md'},{x:42,y:55,s:'sm'},{x:75,y:45,s:'lg'},
    {x:60,y:55,s:'sm'},{x:55,y:70,s:'md'},{x:35,y:80,s:'lg'},{x:92,y:40,s:'sm'},
    {x:8,y:50,s:'md'},{x:48,y:35,s:'sm'},{x:82,y:25,s:'md'},{x:95,y:55,s:'lg'}
  ];
  trees.forEach(function(t) {
    var tree = document.createElement('div');
    tree.className = 'tree '+t.s; tree.style.left = t.x+'%'; tree.style.top = t.y+'%';
    tree.innerHTML = '<div class="trunk"></div><div class="canopy"></div>';
    c.appendChild(tree);
  });
}

// ===== NODES =====
function clickNode(i) {
  if (i !== STATE.currentNode) return;
  if (LOCATIONS[i].isStart) { showStartDialogue(); return; }
  openChallenge(i-1);
}

function showStartDialogue() {
  var ch = document.getElementById('challengeScreen');
  ch.style.display = 'flex';
  document.getElementById('chLoc').textContent = '\u25B8 VILLAGE GATE';
  document.getElementById('chNpc').textContent = 'Elder Compass';
  document.getElementById('chNarrative').textContent = 'An ancient elder stands at the village gate, compass in hand. "Brave knight '+STATE.playerName+'! The Safety Castle has fallen to 10 fearsome hazard guardians. Travel the road, defeat them with your knowledge, and restore safety to the realm!"';
  document.getElementById('chQuestion').textContent = '';
  document.getElementById('chImage').innerHTML = '';
  document.getElementById('chBody').innerHTML = '';
  document.getElementById('chFeedback').style.display = 'none';
  var cont = document.getElementById('chContinue');
  cont.style.display = 'block'; cont.textContent = 'BEGIN THY JOURNEY \u25B6';
}

// ===== CHALLENGE RENDERING =====
function openChallenge(qIdx) {
  var quest = QUESTS[qIdx];
  document.getElementById('challengeScreen').style.display = 'flex';
  document.getElementById('chLoc').textContent = '\u25B8 '+quest.location.toUpperCase();
  document.getElementById('chNpc').textContent = quest.npc;
  document.getElementById('chNarrative').textContent = quest.narrative;
  document.getElementById('chQuestion').textContent = quest.question;
  document.getElementById('chFeedback').style.display = 'none';
  document.getElementById('chContinue').style.display = 'none';
  document.getElementById('chImage').innerHTML = '';
  document.getElementById('chBody').innerHTML = '';

  // Show image if present (skip for hotspot — it renders its own image)
  if (quest.image && IMAGES[quest.image] && quest.type !== 'hotspot') {
    document.getElementById('chImage').innerHTML = '<div class="challenge-img-container"><img src="'+IMAGES[quest.image]+'" alt="Question image"></div>';
  }

  switch(quest.type) {
    case 'mcq': renderMCQ(qIdx, quest); break;
    case 'img_mcq': renderImgMCQ(qIdx, quest); break;
    case 'hotspot': renderHotspot(qIdx, quest); break;
    case 'reorder': renderReorder(qIdx, quest); break;
  }
  window._currentQIdx = qIdx;
}

// MCQ
function renderMCQ(qIdx, quest) {
  var body = document.getElementById('chBody');
  var indexed = quest.answers.map(function(a,i) { return {text:a, origIdx:i}; });
  var shuffled = shuffle(indexed);
  var html = '<div class="challenge-choices">';
  shuffled.forEach(function(item,si) {
    html += '<button class="choice-btn" onclick="selectMCQ('+qIdx+','+item.origIdx+',this)">'+String.fromCharCode(65+si)+'. '+item.text.replace(/"/g,'&quot;')+'</button>';
  });
  html += '</div>';
  body.innerHTML = html;
}

function selectMCQ(qIdx, selectedIdx, btn) {
  var quest = QUESTS[qIdx];
  var isCorrect = selectedIdx === quest.correctIndex;
  var container = btn.parentElement;
  container.querySelectorAll('.choice-btn').forEach(function(b) { b.disabled = true; });

  if (isCorrect) {
    btn.classList.add('correct-flash');
    STATE.score += 100;
    STATE.inventory.push(quest.reward);
    var invEl = document.getElementById('inv-'+qIdx);
    if (invEl) invEl.classList.add('collected');
    showFeedback(true, quest.correctMsg || 'Correct!');
  } else {
    btn.classList.add('wrong-flash');
    var correctText = quest.answers[quest.correctIndex];
    container.querySelectorAll('.choice-btn').forEach(function(b) {
      if (b.textContent.substring(3) === correctText) b.classList.add('correct-flash');
    });
    showFeedback(false, quest.wrongMsg || 'Incorrect.');
  }
  finishQuestion();
}

// IMG MCQ
function renderImgMCQ(qIdx, quest) {
  var body = document.getElementById('chBody');
  var indexed = quest.answers.map(function(a,i) { return {img:a.img, label:a.label, origIdx:i}; });
  var shuffled = shuffle(indexed);
  var html = '<div class="img-choices">';
  shuffled.forEach(function(item) {
    html += '<div class="img-choice-btn" onclick="selectImgMCQ('+qIdx+','+item.origIdx+',this)">';
    html += '<img src="'+IMAGES[item.img]+'" alt="'+item.label.replace(/"/g,'&quot;')+'">';
    html += '<div class="img-label">'+item.label+'</div>';
    html += '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

function selectImgMCQ(qIdx, selectedIdx, btn) {
  var quest = QUESTS[qIdx];
  var isCorrect = selectedIdx === quest.correctIndex;
  var container = btn.parentElement;
  container.querySelectorAll('.img-choice-btn').forEach(function(b) { b.classList.add('disabled'); });

  if (isCorrect) {
    btn.classList.add('correct-flash');
    STATE.score += 100;
    STATE.inventory.push(quest.reward);
    var invEl = document.getElementById('inv-'+qIdx);
    if (invEl) invEl.classList.add('collected');
    showFeedback(true, 'Correct! A GFCI detects ground faults and cuts power in milliseconds, protecting against electric shock.');
  } else {
    btn.classList.add('wrong-flash');
    container.querySelectorAll('.img-choice-btn').forEach(function(b) {
      if (b.querySelector('.img-label').textContent.indexOf('GFCI') >= 0) b.classList.add('correct-flash');
    });
    showFeedback(false, 'A GFCI (Ground Fault Circuit Interrupter) is the correct answer. Surge protectors and power strips do NOT protect against electrical shock!');
  }
  finishQuestion();
}

// HOTSPOT
function renderHotspot(qIdx, quest) {
  STATE.hotspotFound = [];
  STATE.hotspotWrong = false;
  var body = document.getElementById('chBody');
  var correctCount = quest.hotspots.filter(function(h) { return !h.wrong; }).length;

  var html = '<div class="hotspot-status" id="hsStatus">Found: 0 / '+correctCount+'</div>';
  html += '<div class="hotspot-container" id="hsContainer">';
  html += '<img src="'+IMAGES[quest.image]+'" alt="Hotspot image">';
  quest.hotspots.forEach(function(h,i) {
    html += '<div class="hotspot-zone" id="hs-'+i+'" style="left:'+h.x+'%;top:'+h.y+'%;width:'+h.w+'%;height:'+h.h+'%;" onclick="clickHotspot('+qIdx+','+i+')">';
    html += '<span class="hotspot-icon">'+(h.wrong?'\u274C':'\u2705')+'</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div id="hsLabels"></div>';
  html += '<button class="btn-hotspot-done" id="hsDone" onclick="finishHotspot('+qIdx+')">DONE SEARCHING</button>';
  body.innerHTML = html;
}

function clickHotspot(qIdx, zoneIdx) {
  var quest = QUESTS[qIdx];
  var h = quest.hotspots[zoneIdx];
  var el = document.getElementById('hs-'+zoneIdx);
  if (el.classList.contains('found') || el.classList.contains('wrong-click')) return;

  var labels = document.getElementById('hsLabels');
  if (h.wrong) {
    el.classList.add('wrong-click');
    STATE.hotspotWrong = true;
    labels.innerHTML += '<div class="hotspot-wrong-label">\u274C That area is not a hazard!</div>';
  } else {
    el.classList.add('found');
    STATE.hotspotFound.push(h.id);
    labels.innerHTML += '<div class="hotspot-found-label">\u2705 '+h.label+'</div>';
  }

  var correctCount = quest.hotspots.filter(function(z) { return !z.wrong; }).length;
  document.getElementById('hsStatus').textContent = 'Found: '+STATE.hotspotFound.length+' / '+correctCount;
  document.getElementById('hsDone').style.display = 'block';

  if (STATE.hotspotFound.length === correctCount) {
    setTimeout(function() { finishHotspot(qIdx); }, 500);
  }
}

function finishHotspot(qIdx) {
  var quest = QUESTS[qIdx];
  var correctCount = quest.hotspots.filter(function(z) { return !z.wrong; }).length;
  var found = STATE.hotspotFound.length;

  if (found === correctCount && !STATE.hotspotWrong) {
    STATE.score += 100;
    STATE.inventory.push(quest.reward);
    var invEl = document.getElementById('inv-'+qIdx);
    if (invEl) invEl.classList.add('collected');
    showFeedback(true, 'You spotted all '+correctCount+' hazards! The dwarf tosses you his finest pickaxe.');
  } else if (found === correctCount) {
    STATE.score += 50;
    STATE.inventory.push(quest.reward);
    var invEl2 = document.getElementById('inv-'+qIdx);
    if (invEl2) invEl2.classList.add('collected');
    showFeedback(true, 'You found all hazards but also clicked a wrong area. Partial credit! The dwarf gives you his pickaxe.');
  } else {
    showFeedback(false, 'You found '+found+' of '+correctCount+' hazards. The trench has: no ladder for egress, dirt pile too close to edge, and no cave-in protection.');
  }
  document.getElementById('hsDone').style.display = 'none';
  finishQuestion();
}

// REORDER
var reorderItems = [];
var dragIdx = null;

function renderReorder(qIdx, quest) {
  reorderItems = shuffleNeverCorrect(quest.items.slice());
  var body = document.getElementById('chBody');
  buildReorderHTML(body, qIdx);
}

function buildReorderHTML(body, qIdx) {
  var html = '<div class="reorder-list" id="reorderList">';
  reorderItems.forEach(function(item,i) {
    html += '<div class="reorder-item" draggable="false" data-idx="'+i+'" onpointerdown="reorderStart(event,'+i+')">';
    html += '<span class="grip">\u2630</span>';
    html += '<span>'+(i+1)+'. '+item+'</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="btn-reorder-submit" onclick="submitReorder('+qIdx+')">SUBMIT ORDER</button>';
  body.innerHTML = html;
}

function reorderStart(e, idx) {
  e.preventDefault();
  dragIdx = idx;
  var list = document.getElementById('reorderList');
  var items = list.querySelectorAll('.reorder-item');

  function onMove(ev) {
    var rect = list.getBoundingClientRect();
    var y = (ev.clientY || (ev.touches && ev.touches[0] ? ev.touches[0].clientY : 0)) - rect.top;
    var itemH = rect.height / reorderItems.length;
    var target = Math.floor(y / itemH);
    target = Math.max(0, Math.min(reorderItems.length-1, target));
    items.forEach(function(it) { it.classList.remove('drag-over'); });
    if (target !== dragIdx) items[target].classList.add('drag-over');
  }

  function onUp(ev) {
    var rect = list.getBoundingClientRect();
    var y = (ev.clientY || (ev.changedTouches && ev.changedTouches[0] ? ev.changedTouches[0].clientY : 0)) - rect.top;
    var itemH = rect.height / reorderItems.length;
    var target = Math.floor(y / itemH);
    target = Math.max(0, Math.min(reorderItems.length-1, target));

    if (target !== dragIdx) {
      var moved = reorderItems.splice(dragIdx, 1)[0];
      reorderItems.splice(target, 0, moved);
      buildReorderHTML(document.getElementById('chBody'), window._currentQIdx);
    }
    items.forEach(function(it) { it.classList.remove('drag-over'); });
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
  }

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

function submitReorder(qIdx) {
  var quest = QUESTS[qIdx];
  var items = document.querySelectorAll('.reorder-item');
  var correct = 0;
  reorderItems.forEach(function(item,i) {
    if (item === quest.correctOrder[i]) {
      items[i].classList.add('correct-pos');
      correct++;
    } else {
      items[i].classList.add('wrong-pos');
    }
  });

  document.querySelector('.btn-reorder-submit').style.display = 'none';
  items.forEach(function(it) { it.style.pointerEvents = 'none'; });

  if (correct === quest.correctOrder.length) {
    STATE.score += 100;
    STATE.inventory.push(quest.reward);
    var invEl = document.getElementById('inv-'+qIdx);
    if (invEl) invEl.classList.add('collected');
    showFeedback(true, 'Perfect order! Elimination first, then engineering controls, then admin controls, and PPE last. The commander salutes you!');
  } else {
    showFeedback(false, 'The correct order is: 1) Remove the hazard (Elimination), 2) Block or guard it (Engineering), 3) Rules/training (Admin), 4) Wear PPE. Elimination is always best!');
  }
  finishQuestion();
}

// ===== HELPERS =====
function showFeedback(correct, msg) {
  var fb = document.getElementById('chFeedback');
  fb.className = 'challenge-feedback '+(correct?'correct':'wrong');
  fb.textContent = msg; fb.style.display = 'block';
}

function finishQuestion() {
  STATE.questsCompleted++;
  updateHud();
  setTimeout(function() {
    var cont = document.getElementById('chContinue');
    cont.style.display = 'block';
    cont.textContent = 'CONTINUE THY JOURNEY \u25B6';
  }, 600);
}

function continueFromChallenge() {
  document.getElementById('challengeScreen').style.display = 'none';
  STATE.currentNode++;
  if (STATE.currentNode >= LOCATIONS.length-1) { showWinScreen(); return; }
  positionPlayer(STATE.currentNode); updateNodes();
}

function positionPlayer(nodeIdx) {
  var loc = LOCATIONS[nodeIdx];
  var p = document.getElementById('mapPlayer');
  p.style.left = 'calc('+loc.x+'% - 12px)';
  p.style.top = 'calc('+loc.y+'% - 36px)';
}

function updateNodes() {
  LOCATIONS.forEach(function(loc,i) {
    if (loc.isCastle) return;
    var node = document.getElementById('node-'+i);
    if (!node) return;
    node.classList.remove('current','completed','locked');
    if (i < STATE.currentNode) node.classList.add('completed');
    else if (i === STATE.currentNode) node.classList.add('current');
    else node.classList.add('locked');
  });
}

function updateHud() {
  document.getElementById('hudQuests').textContent = 'QUESTS: '+STATE.questsCompleted+' / 10';
  document.getElementById('hudScore').textContent = 'SCORE: '+STATE.score;
}

// ===== WIN SCREEN =====
function showWinScreen() {
  document.getElementById('mapScreen').style.display = 'none';
  document.getElementById('winScreen').style.display = 'flex';
  var endTime = new Date();
  var dur = Math.round((endTime - STATE.startTime)/1000);
  var mins = Math.floor(dur/60), secs = dur%60;
  var pct = Math.round((STATE.score/1000)*100);

  var itemsDiv = document.getElementById('winItems');
  itemsDiv.innerHTML = '';
  STATE.inventory.forEach(function(icon) {
    var sp = document.createElement('span');
    sp.textContent = icon; sp.style.filter = 'drop-shadow(0 0 4px rgba(200,169,81,0.5))';
    itemsDiv.appendChild(sp);
  });

  var rows = [
    ['Knight', STATE.playerName], ['Guild', STATE.playerCompany], ['Realm', STATE.playerSite],
    ['Score', STATE.score+' / 1000'], ['Correct Answers', STATE.inventory.length+' / 10'],
    ['Accuracy', pct+'%'], ['Quest Time', mins+'m '+secs+'s'], ['Items Collected', STATE.inventory.length+' / 10']
  ];
  document.getElementById('winStats').innerHTML = rows.map(function(r) {
    return '<div class="win-stat-row"><span class="win-stat-label">'+r[0]+'</span><span class="win-stat-value">'+r[1]+'</span></div>';
  }).join('');

  sendResults(dur, pct);
}

function sendResults(dur, pct) {
  if (!WEBHOOK_URL) return;
  try { fetch(WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ playerName:STATE.playerName, playerCompany:STATE.playerCompany,
      playerSite:STATE.playerSite, gameTitle:GAME_TITLE, gameVersion:GAME_VERSION,
      totalScore:STATE.score, maxScore:1000, correctAnswers:STATE.inventory.length,
      percentage:pct, durationSeconds:dur, submittedAt:new Date().toISOString()
    })
  }); } catch(e) {}
}

// Set logo image
if (typeof LOGO_B64 !== 'undefined') {
  document.getElementById('titleLogoImg').src = LOGO_B64;
}

initTitle(); initHudInventory();

</script>
